# =============================================================
# postgresql.conf — Low Resource Configuration
# Target: ≤ 500MB RAM for PostgreSQL container
# =============================================================

# --- MEMORY ---
shared_buffers        = 128MB     # 25% of 500MB target (default is 128MB, keep it)
work_mem              = 4MB       # Per query sort/hash — keep low, concurrent queries add up
maintenance_work_mem  = 32MB      # For VACUUM, CREATE INDEX — only runs occasionally
effective_cache_size  = 256MB     # Hint to planner, doesn't allocate memory

# --- CONNECTIONS ---
max_connections       = 20        # Small pool: NestJS uses max 5, leave headroom
# With work_mem=4MB and max 20 connections: worst case = 80MB for sorts

# --- WAL / DURABILITY ---
wal_buffers           = 4MB       # Small, sufficient for this workload
checkpoint_completion_target = 0.9
wal_level             = minimal   # No replication needed, reduce WAL overhead

# --- BACKGROUND WORKERS ---
max_worker_processes        = 2   # Reduce from default 8
max_parallel_workers        = 1   # Disable parallelism — not needed at this scale
max_parallel_workers_per_gather = 0

# --- LOGGING (minimal) ---
log_min_duration_statement  = 1000  # Only log queries > 1s
log_statement               = 'none'

# --- AUTOVACUUM ---
autovacuum_max_workers      = 1   # Default is 3, reduce
autovacuum_naptime          = 60  # Check every 60s instead of 60s default (same, explicit)

# --- MISC ---
random_page_cost      = 1.1       # SSD assumption — prefer index scans
effective_io_concurrency = 100    # SSD: allow concurrent I/O hints to planner
