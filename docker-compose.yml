  # =============================================================
  # 3D Printing Chatbot — Docker Compose
  # Total RAM budget: ~8GB across all containers
  #
  # nestjs-backend:  512MB–800MB
  # postgres:        ≤ 500MB
  # whatsapp-bot:    ≤ 500MB
  # ollama:          4–5GB (model loaded in VRAM, host RAM for overhead)
  # =============================================================

  services:

    # -----------------------------------------------------------
    # PostgreSQL — tuned for low memory via custom config
    # -----------------------------------------------------------
    postgres:
      image: postgres:16-alpine
      container_name: protobot-postgres
      restart: unless-stopped
      environment:
        POSTGRES_DB:       ${POSTGRES_DB:-protobot}
        POSTGRES_USER:     ${POSTGRES_USER:-protobot}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-protobot}
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      command: postgres -c config_file=/etc/postgresql/postgresql.conf
      ports:
        - "127.0.0.1:5432:5432"
      deploy:
        resources:
          limits:
            memory: 512MB
          reservations:
            memory: 128MB
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-protobot} -d ${POSTGRES_DB:-protobot}"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s
      networks:
        - protobot-net

    # -----------------------------------------------------------
    # NestJS Backend
    # -----------------------------------------------------------
    nestjs-backend:
      build:
        context: ./
        dockerfile: Dockerfile
      container_name: protobot-backend
      restart: unless-stopped
      env_file: .env
      environment:
        DATABASE_URL: ${DATABASE_URL}
        OLLAMA_HOST:  http://ollama:11434
        NODE_ENV:     development
      ports:
        - "127.0.0.1:3000:3000"
      depends_on:
        postgres:
          condition: service_healthy
        ollama:
          condition: service_healthy
      deploy:
        resources:
          limits:
            memory: 800MB
          reservations:
            memory: 256MB
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
        interval: 15s
        timeout: 5s
        retries: 3
        start_period: 30s
      networks:
        - protobot-net

    # -----------------------------------------------------------
    # WhatsApp Bot — separate container, isolated Puppeteer
    # -----------------------------------------------------------
    whatsapp-bot:
      build:
        context: ./whatsapp-bot
        dockerfile: Dockerfile
      container_name: protobot-whatsapp
      restart: unless-stopped
      environment:
        BACKEND_URL:         http://nestjs-backend:3000
        BOT_HTTP_PORT:       3001
        REQUEST_TIMEOUT_MS:  90000
        PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      volumes:
        - whatsapp_auth:/app/.wwebjs_auth
        - whatsapp_cache:/app/.wwebjs_cache
      ports:
        - "127.0.0.1:3001:3001"
      depends_on:
        nestjs-backend:
          condition: service_healthy
      deploy:
        resources:
          limits:
            memory: 512MB
          reservations:
            memory: 200MB
      shm_size: '256mb'
      networks:
        - protobot-net

    # -----------------------------------------------------------
    # Ollama — LLM inference, GPU passthrough
    # -----------------------------------------------------------
    ollama:
      image: ollama/ollama:latest
      container_name: protobot-ollama
      restart: unless-stopped
      ports:
        - "127.0.0.1:11434:11434"
      volumes:
        - ollama_models:/root/.ollama
      deploy:
        resources:
          limits:
            memory: 5GB
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      mem_limit: 5g
      memswap_limit: 5g
      environment:
        OLLAMA_NUM_PARALLEL: 1
        OLLAMA_MAX_LOADED_MODELS: 1
        OLLAMA_FLASH_ATTENTION: 1
        OLLAMA_KEEP_ALIVE: 24h
        OLLAMA_NUM_THREAD: 3
        OLLAMA_GPU_MEMORY_FRACTION: 0.8
        OLLAMA_GPU_LAYERS: 99
      healthcheck:
        test: ["CMD", "ollama", "list"]
        interval: 10s
        timeout: 10s
        retries: 10
        start_period: 120s
      networks:
        - protobot-net

    # -----------------------------------------------------------
    # Model puller — runs once then exits
    # -----------------------------------------------------------
    ollama-pull:
      image: ollama/ollama:latest
      container_name: protobot-ollama-pull
      restart: "no"
      depends_on:
        ollama:
          condition: service_healthy
      environment:
        OLLAMA_HOST: http://ollama:11434
      entrypoint: ["/bin/sh", "-c"]
      command: >
        "ollama pull qwen2.5:3b-instruct-q4_K_M &&
        echo 'Model ready'"
      networks:
        - protobot-net

  # =============================================================
  # Volumes
  # =============================================================
  volumes:
    postgres_data:
      driver: local
    ollama_models:
      driver: local
    whatsapp_auth:
      driver: local
    whatsapp_cache:
      driver: local

  # =============================================================
  # Network
  # =============================================================
  networks:
    protobot-net:
      driver: bridge
