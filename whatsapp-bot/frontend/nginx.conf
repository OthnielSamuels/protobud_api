server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' http://nestjs-backend:3000; img-src 'self' data:;" always;

    # Cache static assets
    location ~* \.(css|js|woff2?|png|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Proxy API calls to NestJS backend
    location /api/ {
        proxy_pass http://nestjs-backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # All other routes → SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable server tokens
    server_tokens off;
}
