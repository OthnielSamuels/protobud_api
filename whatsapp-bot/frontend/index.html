<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protobud — Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
      <div class="login-bg">
        <div class="login-grid"></div>
      </div>
      <div class="login-box">
        <div class="login-logo">
          <span class="logo-mark">⬡</span>
          <span class="logo-text">Protobud</span>
        </div>
        <p class="login-subtitle">Operator Control Center</p>
        <div id="login-error" class="login-error hidden">Invalid credentials</div>
        <div class="field-group">
          <label class="field-label">USERNAME</label>
          <input type="text" id="login-username" class="field-input" placeholder="operator" autocomplete="username" />
        </div>
        <div class="field-group">
          <label class="field-label">PASSWORD</label>
          <input type="password" id="login-password" class="field-input" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button id="login-btn" class="btn-primary btn-full">
          <span>AUTHENTICATE</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <p class="login-footer">Secure access · All sessions logged</p>
      </div>
    </div>

    <!-- Main App Shell -->
    <div id="main-app" class="main-app hidden">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span class="logo-mark">⬡</span>
          <span class="logo-text">Protobud</span>
        </div>

        <div class="sidebar-section-label">OPERATIONS</div>
        <nav class="sidebar-nav">
          <a href="#dashboard" class="nav-item" data-page="dashboard">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
            Dashboard
          </a>
          <a href="#pipeline" class="nav-item" data-page="pipeline">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h8M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="13" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/></svg>
            Pipeline
            <span class="nav-badge" id="pipeline-badge">0</span>
          </a>
        </nav>

        <div class="sidebar-section-label">MANAGEMENT</div>
        <nav class="sidebar-nav">
          <a href="#clients" class="nav-item" data-page="clients">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Clients
          </a>
          <a href="#projects" class="nav-item" data-page="projects">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12v10H2z" stroke="currentColor" stroke-width="1.5" rx="1"/><path d="M5 3V1M11 3V1M2 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Projects
          </a>
          <a href="#estimates" class="nav-item" data-page="estimates">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2h8a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Estimates
          </a>
          <a href="#invoices" class="nav-item" data-page="invoices">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M5 6h6M5 9h3M10 9h1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 11v1M8 4v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Invoices
          </a>
        </nav>

        <div class="sidebar-section-label">SYSTEM</div>
        <nav class="sidebar-nav">
          <a href="#whatsapp" class="nav-item" data-page="whatsapp">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1C4.134 1 1 4.134 1 8c0 1.29.348 2.496.957 3.534L1 15l3.567-.93A7 7 0 108 1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            WhatsApp Bot
            <span class="status-dot" id="wa-status-dot"></span>
          </a>
          <a href="#send-message" class="nav-item" data-page="send-message">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 2L7 9M14 2L9 14l-2-5-5-2 12-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Send Message
          </a>
          <a href="#ai-monitor" class="nav-item" data-page="ai-monitor">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            AI Monitor
            <span class="status-dot" id="ai-status-dot"></span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <button id="logout-btn" class="logout-btn">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Logout
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <div id="page-container"></div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button id="modal-close" class="modal-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
